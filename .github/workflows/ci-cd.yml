name: CI/CD Workflow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout de repository in de standaard werkdirectory van GitHub Actions
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Installeer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      # Verifieer Node.js installatie
      - name: Verify Node.js Installation
        run: |
          node -v
          npm -v

      # Login bij Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Initialiseer Docker Swarm
      - name: Initialize Docker Swarm
        run: |
          docker swarm init || echo "Docker Swarm is mogelijk al geïnitialiseerd"

      # Terraform configureren
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.0

      # Initialiseer Terraform
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      # Pas Terraform toe
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform

      # Stel SSH-sleutel in
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # Test SSH-verbinding
      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 swarm_user@${{ secrets.SWARM_HOST }} "echo 'SSH verbinding succesvol'"

      # Voer Ansible playbook uit
      - name: Run Ansible Playbook
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: swarm_user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/repos/infrastructure/ansible
            ansible-playbook playbook.yml -i inventory.yml

      # Deploy Docker Stack
      - name: Deploy Docker Stack
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: swarm_user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/repos/infrastructure
            docker stack deploy -c docker-compose.yml infrastructure_stack

