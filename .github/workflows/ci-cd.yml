on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Login to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      - name: Initialize Docker Swarm
        run: |
          docker swarm init || echo "Docker Swarm is mogelijk al geïnitialiseerd"
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform

      - name: Run Ansible Playbook
        run: ansible-playbook playbook.yml -i inventory.yml -vvv
        working-directory: ./ansible

      - name: Deploy Docker Stack
        env:
          REMOTE_HOST: 192.168.178.183
          REMOTE_USER: swarm_user
          REMOTE_PATH: /home/rob/repos/infrastructure
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }} "
            cd ${{ env.REMOTE_PATH }} &&
            docker stack deploy -c docker-compose.yml infrastructure_stack
          "
