name: Runner Diagnostics

on:
  push:
    branches:
      - main

jobs:
  diagnose_runner:
    runs-on: self-hosted

    steps:
      # 1. Basis informatie over de runner
      - name: Runner Info
        run: |
          set -x
          echo "[INFO] Runner systeeminformatie:"
          uname -a
          echo "[INFO] Huidige gebruiker:"
          whoami
          echo "[INFO] Home directory:"
          echo $HOME
          echo "[INFO] Omgevingsvariabelen:"
          env
        shell: bash

      # 2. Netwerkconfiguratie inspecteren
      - name: Network Configuration
        run: |
          set -x
          echo "[INFO] Netwerkinterfaces en IP-adressen:"
          ip addr show
          echo "[INFO] Routing tabel:"
          ip route
          echo "[INFO] DNS resolvers:"
          cat /etc/resolv.conf
        shell: bash

      # 3. Controleer firewall instellingen
      - name: Firewall Rules
        run: |
          set -x
          echo "[INFO] Firewall regels (iptables):"
          sudo iptables -L -n -v
        shell: bash

      # 4. Controleer open poorten en luisterende services
      - name: Open Ports and Listening Services
        run: |
          set -x
          echo "[INFO] Luisterende poorten:"
          sudo netstat -tulpn
        shell: bash

      # 5. Pakketbeheer en geïnstalleerde pakketten
      - name: Installed Packages
        run: |
          set -x
          echo "[INFO] Geïnstalleerde pakketten (apt):"
          dpkg -l
        shell: bash

      # 6. Controleer of bepaalde tools beschikbaar zijn
      - name: Check Available Tools
        run: |
          set -x
          echo "[INFO] Controleer of essentiële tools beschikbaar zijn:"
          which ssh
          which ssh-agent
          which docker
          which ansible
          which terraform
        shell: bash

      # 7. Diskruimte en schijfindeling
      - name: Disk Usage and Layout
        run: |
          set -x
          echo "[INFO] Schijfruimte gebruik:"
          df -h
          echo "[INFO] Schijfindeling:"
          lsblk
        shell: bash

      # 8. Processen die draaien op de runner
      - name: Running Processes
        run: |
          set -x
          echo "[INFO] Actieve processen:"
          ps aux
        shell: bash

      # 9. Controleer of de runner internettoegang heeft
      - name: Internet Connectivity Test
        run: |
          set -x
          echo "[INFO] Test internetconnectiviteit:"
          ping -c 4 8.8.8.8 || echo "[ERROR] Kan 8.8.8.8 niet bereiken"
          ping -c 4 google.com || echo "[ERROR] Kan google.com niet bereiken"
          curl -I https://www.google.com || echo "[ERROR] Kan geen HTTPS-verbinding maken met google.com"
        shell: bash

      # 10. Log bestanden bekijken (optioneel)
      - name: View Log Files
        run: |
          set -x
          echo "[INFO] Laatste systeemlogs:"
          sudo tail -n 100 /var/log/syslog
        shell: bash

      # 11. Omgevingsvariabelen specifiek voor GitHub Actions
      - name: GitHub Actions Environment Variables
        run: |
          set -x
          echo "[INFO] GitHub Actions specifieke omgevingsvariabelen:"
          env | grep GITHUB_
        shell: bash

      # 12. Netwerk testen naar doelserver (zonder ping)
      - name: Network Test to Target Server
        run: |
          set -x
          echo "[INFO] Test netwerkconnectiviteit naar doelserver:"
          traceroute ${{ secrets.SWARM_HOST }} || echo "[ERROR] Traceroute naar doelserver mislukt"
          nc -vz ${{ secrets.SWARM_HOST }} 22 || echo "[ERROR] Kan geen verbinding maken met poort 22 op doelserver"
        shell: bash

      # 13. Check Docker Swarm status (indien relevant)
      - name: Docker Swarm Status
        run: |
          set -x
          echo "[INFO] Docker Swarm status:"
          docker info | grep -i swarm
        shell: bash

      # 14. Controleer hosts file
      - name: Hosts File
        run: |
          set -x
          echo "[INFO] /etc/hosts inhoud:"
          cat /etc/hosts
        shell: bash

