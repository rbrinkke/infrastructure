name: Runner Diagnostics

on:
  push:
    branches:
      - main

jobs:
  diagnose_runner:
    runs-on: self-hosted

    steps:
      # 1. Basisinformatie over de runner
      - name: Runner Info
        run: |
          set -x
          echo "[INFO] Systeeminformatie:"
          uname -a
          echo "[INFO] Huidige gebruiker:"
          whoami
          echo "[INFO] Home directory:"
          echo $HOME
          echo "[INFO] Omgevingsvariabelen:"
          env
        shell: bash

      # 2. Netwerkconfiguratie inspecteren
      - name: Network Configuration
        run: |
          set -x
          echo "[INFO] Netwerkinterfaces en IP-adressen:"
          ip addr show
          echo "[INFO] Routing tabel:"
          ip route
          echo "[INFO] DNS resolvers:"
          cat /etc/resolv.conf
        shell: bash

      # 3. Controleer of 'ss' beschikbaar is
      - name: Check 'ss' Command Availability
        run: |
          set -x
          if command -v ss > /dev/null; then
            echo "[INFO] 'ss' command is available."
          else
            echo "[ERROR] 'ss' command is not available."
          fi
        shell: bash

      # 4. Open poorten en luisterende services
      - name: Open Ports and Listening Services
        run: |
          set -x
          echo "[INFO] Luisterende poorten:"
          ss -tulpn || echo "[ERROR] 'ss' commando niet beschikbaar"
        shell: bash

      # 5. Controleer beschikbare tools
      - name: Check Available Tools
        run: |
          set -x
          echo "[INFO] Beschikbare tools:"
          which ssh || echo "ssh niet gevonden"
          which docker || echo "docker niet gevonden"
          which ansible || echo "ansible niet gevonden"
          which terraform || echo "terraform niet gevonden"
        shell: bash

      # 6. Controleer actieve processen
      - name: Running Processes
        run: |
          set -x
          echo "[INFO] Actieve processen:"
          ps aux
        shell: bash

      # 7. Internetconnectiviteitstest
      - name: Internet Connectivity Test
        run: |
          set -x
          echo "[INFO] Test internetconnectiviteit:"
          ping -c 4 8.8.8.8 || echo "[ERROR] Kan 8.8.8.8 niet bereiken"
          ping -c 4 google.com || echo "[ERROR] Kan google.com niet bereiken"
          curl -I https://www.google.com || echo "[ERROR] Kan geen HTTPS-verbinding maken met google.com"
        shell: bash

      # 8. Ping naar doelserver
      - name: Ping Target Server
        run: |
          set -x
          echo "[INFO] Pingen naar doelserver..."
          ping -c 4 ${{ secrets.SWARM_HOST }} || echo "[ERROR] Kan doelserver niet bereiken"
        shell: bash

      # 9. DNS-resolutie test
      - name: DNS Resolution Test
        run: |
          set -x
          echo "[INFO] DNS-resolutie test voor doelserver..."
          nslookup ${{ secrets.SWARM_HOST }} || echo "[ERROR] Kan hostnaam niet resolven"
        shell: bash

      # 10. Traceroute naar doelserver
      - name: Traceroute to Target Server
        run: |
          set -x
          echo "[INFO] Traceroute naar doelserver..."
          traceroute ${{ secrets.SWARM_HOST }} || echo "[ERROR] Traceroute mislukt"
        shell: bash

      # 11. Controleer SSH-poort op doelserver
      - name: Check SSH Port
        run: |
          set -x
          echo "[INFO] Controleer of poort 22 open is op de doelserver..."
          nc -zv ${{ secrets.SWARM_HOST }} 22 || echo "[ERROR] Poort 22 is niet bereikbaar"
        shell: bash

      # 12. Firewall-instellingen op de runner
      - name: Firewall Rules
        run: |
          set -x
          echo "[INFO] Firewall regels:"
          sudo iptables -L -n -v
        shell: bash

      # 13. Controleer hosts file
      - name: Hosts File
        run: |
          set -x
          echo "[INFO] /etc/hosts inhoud:"
          cat /etc/hosts
        shell: bash

