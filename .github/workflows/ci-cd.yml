name: CI/CD Workflow

on:
  push:
    branches:
      - main

jobs:
  debug-runner:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout de repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Debug Runner Netwerkomgeving
      - name: Debug Runner Network Environment
        run: |
          set -x
          echo "[DEBUG] Checking runner network environment..."
          ip addr
          echo "[DEBUG] Checking routing table..."
          ip route
          echo "[DEBUG] Checking Docker network (if applicable)..."
          docker network ls || echo "Docker not available."
          echo "[DEBUG] Displaying open network connections:"
          netstat -an

      # 3. Debug processen en omgeving
      - name: Debug Runner Processes and Environment
        run: |
          set -x
          echo "[DEBUG] Current processes:"
          ps aux
          echo "[DEBUG] Current user and groups:"
          id
          echo "[DEBUG] Current working directory:"
          pwd
          echo "[DEBUG] Environment variables:"
          env
          echo "[DEBUG] Uptime:"
          uptime

      # 4. Debug SSH-sleutel en permissies (indien nodig voor tests)
      - name: Validate Runner SSH Environment
        run: |
          set -x
          echo "[DEBUG] Validating SSH environment on the runner..."
          ls -la ~/.ssh/ || echo "[ERROR] SSH directory not found."
          ssh-keygen -lf ~/.ssh/id_ed25519 || echo "[ERROR] SSH key validation failed!"

      # 5. Debug firewallstatus
      - name: Debug Firewall Status
        run: |
          set -x
          echo "[DEBUG] Checking firewall status..."
          sudo ufw status || echo "[DEBUG] Firewall not active or not accessible."

