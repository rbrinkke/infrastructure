name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      REMOTE_HOST: "192.168.178.183"
      REMOTE_USER: "swarm_user"
      REMOTE_PATH: "/home/rob/repos/infrastructure"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ env.SSH_KEY }}

      - name: Debug Docker Login
        run: |
          set -x
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Initialize Docker Swarm
        run: |
          set -x
          docker swarm init || echo "Docker Swarm is mogelijk al geïnitialiseerd"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.0

      # Stel Terraform in op DEBUG modus voor meer output
      - name: Terraform Init
        working-directory: ./terraform
        run: |
          set -x
          export TF_LOG=DEBUG
          terraform init

      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          set -x
          export TF_LOG=DEBUG
          terraform apply -auto-approve

      - name: Run Ansible Playbook with more verbosity
        working-directory: ./ansible
        run: |
          set -x
          ansible-playbook playbook.yml -i inventory.yml -vvvv

      - name: Deploy Docker Stack
        run: |
          set -x
          ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "
            cd $REMOTE_PATH &&
            docker stack deploy -c docker-compose.yml infrastructure_stack
          "

