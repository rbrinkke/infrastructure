name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Gebruik je self-hosted runner
    runs-on: self-hosted

    steps:
      # Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Log in to Docker Hub
      - name: Login to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"

      # Initialize Docker Swarm
      - name: Initialize Docker Swarm
        run: |
          docker swarm init || echo "Docker Swarm is mogelijk al geïnitialiseerd"

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.0

      # Initialize Terraform
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      # Apply Terraform configuration
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform

      # Run Ansible playbook
      - name: Run Ansible Playbook
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: swarm_user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/rob/repos/infrastructure/ansible
            ansible-playbook playbook.yml -i inventory.yml

      # Deploy Docker stack
      - name: Deploy Docker Stack
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: swarm_user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/rob/repos/infrastructure
            docker stack deploy -c docker-compose.yml infrastructure_stack

