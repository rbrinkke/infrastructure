      - name: Deep Debug SSH Connection
        run: |
          set -x
          echo "[DEBUG] Starting in-depth SSH debugging..."
          echo "[DEBUG] Validating SSH key:"
          ssh-keygen -lf ~/.ssh/id_ed25519 || echo "[ERROR] Key invalid!"

          echo "[DEBUG] Testing server reachability..."
          ping -c 4 192.168.178.183 || echo "[ERROR] Host unreachable!"

          echo "[DEBUG] Attempting SSH connection with extensive logging:"
          timeout 60 ssh -vvv -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 swarm_user@192.168.178.183 "uptime && whoami" || echo "[ERROR] SSH failed after timeout!"

          echo "[DEBUG] SSH debug complete."

