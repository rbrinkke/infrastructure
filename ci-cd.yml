name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Gebruik je self-hosted runner
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        shell: bash

      - name: Initialize Docker Swarm
        run: |
          docker swarm init || echo "Docker Swarm is mogelijk al geïnitialiseerd"
        shell: bash

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.0

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform
        shell: bash

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform
        shell: bash

      - name: Run Ansible Playbook
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: swarm_user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/rob/repos/infrastructure/ansible
            ansible-playbook playbook.yml -i inventory.yml

      - name: Deploy Docker Stack
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: swarm_user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/rob/repos/infrastructure
            docker stack deploy -c docker-compose.yml infrastructure_stack

